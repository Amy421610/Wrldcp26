<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predicciones Mundial 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; font-family: 'Barlow', sans-serif; color: #1a1a1a; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }

    /* ── Animaciones ── */
    @keyframes cardEnter { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes zoomEnter { from { opacity:0; transform:scale(.96); }       to { opacity:1; transform:scale(1); } }
    .card-enter { animation: cardEnter .35s cubic-bezier(.22,1,.36,1) both; }
    .zoom-enter { animation: zoomEnter .4s  cubic-bezier(.22,1,.36,1) both; }

    /* ── Layout base ── */
    .page { min-height:100vh; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #f0f0f0;
      padding: 12px 16px;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px;
    }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-dot { width:32px; height:32px; border-radius:50%; background: linear-gradient(135deg,#7A00E6,#00E5FF); flex-shrink:0; }
    .logo h1 { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:900; letter-spacing:-.03em; }

    /* ── Nav tabs ── */
    .nav-tabs { display:flex; gap:4px; background:#f5f5f5; padding:4px; border-radius:999px; overflow-x:auto; }
    .nav-tab {
      padding:8px 14px; border-radius:999px; font-size:.8rem; font-weight:700;
      white-space:nowrap; border:none; cursor:pointer; background:transparent;
      color:#737373; transition:all .2s; display:flex; align-items:center; gap:5px;
    }
    .nav-tab.active { background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.12); }

    /* ── Main container ── */
    main { max-width:1200px; margin:0 auto; padding:24px 16px 48px; }

    /* ── PERFILES ── */
    .profiles-wrap { max-width:640px; margin:0 auto; text-align:center; }
    .profiles-title { font-family:'Barlow Condensed',sans-serif; font-size:3rem; font-weight:900; letter-spacing:-.04em; margin-bottom:8px; }
    .profiles-sub { color:#737373; margin-bottom:32px; }
    .profiles-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    @media(min-width:480px){ .profiles-grid { grid-template-columns:repeat(3,1fr); } }
    .profile-card {
      position:relative; padding:24px 16px; border-radius:20px; border:2px solid #e5e5e5;
      cursor:pointer; transition:transform .2s, border-color .2s;
    }
    .profile-card:hover { transform:scale(1.04); }
    .profile-avatar { width:64px; height:64px; border-radius:50%; margin:0 auto 12px; }
    .profile-name { font-weight:700; font-size:.95rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .profile-delete {
      position:absolute; top:8px; right:8px; width:24px; height:24px;
      border-radius:50%; border:none; background:#f5f5f5; color:#a3a3a3;
      font-size:.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .2s, color .2s;
    }
    .profile-delete:hover { background:#fee2e2; color:#ef4444; }
    
    .profile-add {
      padding:24px 16px; border-radius:20px; border:2px dashed #d4d4d4;
      display:flex; flex-direction:column; align-items:center; gap:12px;
    }
    .profile-add-icon { width:40px; height:40px; border-radius:50%; background:#f5f5f5; color:#a3a3a3; font-size:1.2rem; display:flex; align-items:center; justify-content:center; }
    .profile-add input {
      width:100%; text-align:center; font-size:.85rem; font-weight:700;
      background:transparent; border:none; border-bottom:1px solid #d4d4d4; padding-bottom:4px; outline:none;
      font-family:'Barlow',sans-serif;
    }
    .profile-add input:focus { border-bottom-color:#1a1a1a; }
    .color-picker { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 4px; }
    .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .2s; }
    .color-dot:hover { transform: scale(1.1); }
    .color-dot.active { transform: scale(1.2); border-color: #1a1a1a; box-shadow: 0 0 0 2px #fff inset; }
    .btn-create {
      font-size:.75rem; font-weight:700; padding:8px 16px;
      background:#1a1a1a; color:#fff; border:none; border-radius:999px; cursor:pointer;
      transition:background .2s;
    }
    .btn-create:hover { background:#404040; }

    /* ── GRUPOS ── */
    .group-tabs { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:32px; }
    .group-tab {
      width:48px; height:48px; border-radius:12px; border:none;
      font-size:1.1rem; font-weight:900; cursor:pointer;
      background:#f5f5f5; color:#a3a3a3; transition:all .2s;
      font-family:'Barlow Condensed',sans-serif;
    }
    .group-tab.active { color:#fff; transform:scale(1.1); }

    .groups-layout { display:grid; gap:32px; }
    @media(min-width:1024px){ .groups-layout { grid-template-columns:7fr 5fr; } }

    .section-title { font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:900; margin-bottom:16px; }
    .section-title-sm { font-size:1.1rem; font-weight:700; margin-bottom:16px; }

    .legend { display:flex; gap:16px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
    .legend-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

    /* Tabla */
    .standings-card { background:#fff; border-radius:24px; border:1px solid #e5e5e5; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .standings-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:16px; }
    table { width:100%; border-collapse:collapse; font-size:.85rem; }
    thead th { background:#fafafa; color:#a3a3a3; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:14px 8px; border-bottom:1px solid #f0f0f0; }
    thead th:first-child { padding-left:24px; text-align:left; }
    thead th:last-child { padding-right:24px; color:#1a1a1a; }
    tbody td { padding:14px 8px; text-align:center; color:#737373; font-weight:500; border-bottom:1px solid
