<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predicciones Mundial 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; font-family: 'Barlow', sans-serif; color: #1a1a1a; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }

    /* ── Animaciones ── */
    @keyframes cardEnter { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes zoomEnter { from { opacity:0; transform:scale(.96); }       to { opacity:1; transform:scale(1); } }
    .card-enter { animation: cardEnter .35s cubic-bezier(.22,1,.36,1) both; }
    .zoom-enter { animation: zoomEnter .4s  cubic-bezier(.22,1,.36,1) both; }

    /* ── Layout base ── */
    .page { min-height:100vh; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid #f0f0f0;
      padding: 12px 16px;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px;
    }
    .logo { display:flex; align-items:center; gap:10px; }
    .logo-dot { width:32px; height:32px; border-radius:50%; background: linear-gradient(135deg,#6820C9,#0059C8); flex-shrink:0; }
    .logo h1 { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:900; letter-spacing:-.03em; }

    /* ── Nav tabs ── */
    .nav-tabs { display:flex; gap:4px; background:#f5f5f5; padding:4px; border-radius:999px; overflow-x:auto; }
    .nav-tab {
      padding:8px 14px; border-radius:999px; font-size:.8rem; font-weight:700;
      white-space:nowrap; border:none; cursor:pointer; background:transparent;
      color:#737373; transition:all .2s; display:flex; align-items:center; gap:5px;
    }
    .nav-tab.active { background:#fff; color:#6820C9; box-shadow:0 1px 4px rgba(0,0,0,.12); }

    /* ── Main container ── */
    main { max-width:1200px; margin:0 auto; padding:24px 16px 48px; }

    /* ── PERFILES ── */
    .profiles-wrap { max-width:640px; margin:0 auto; text-align:center; }
    .profiles-title { font-family:'Barlow Condensed',sans-serif; font-size:3rem; font-weight:900; letter-spacing:-.04em; margin-bottom:8px; }
    .profiles-sub { color:#737373; margin-bottom:32px; }
    .profiles-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    @media(min-width:480px){ .profiles-grid { grid-template-columns:repeat(3,1fr); } }
    .profile-card {
      position:relative; padding:24px 16px; border-radius:20px; border:2px solid #e5e5e5;
      cursor:pointer; transition:transform .2s, border-color .2s;
    }
    .profile-card:hover { transform:scale(1.04); }
    .profile-avatar { width:64px; height:64px; border-radius:50%; margin:0 auto 12px; }
    .profile-name { font-weight:700; font-size:.95rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .profile-delete {
      position:absolute; top:8px; right:8px; width:24px; height:24px;
      border-radius:50%; border:none; background:#f5f5f5; color:#a3a3a3;
      font-size:.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .2s, color .2s;
    }
    .profile-delete:hover { background:#fee2e2; color:#ef4444; }
    .profile-add {
      padding:24px 16px; border-radius:20px; border:2px dashed #d4d4d4;
      display:flex; flex-direction:column; align-items:center; gap:10px;
    }
    .profile-add-icon { width:48px; height:48px; border-radius:50%; background:#f5f5f5; color:#a3a3a3; font-size:1.5rem; display:flex; align-items:center; justify-content:center; }
    .profile-add input {
      width:100%; text-align:center; font-size:.85rem; font-weight:700;
      background:transparent; border:none; border-bottom:1px solid #d4d4d4; padding-bottom:4px; outline:none;
      font-family:'Barlow',sans-serif;
    }
    .profile-add input:focus { border-bottom-color:#1a1a1a; }
    .btn-create {
      font-size:.75rem; font-weight:700; padding:6px 14px;
      background:#1a1a1a; color:#fff; border:none; border-radius:999px; cursor:pointer;
      transition:background .2s;
    }
    .btn-create:hover { background:#404040; }

    /* ── GRUPOS ── */
    .group-tabs { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:32px; }
    .group-tab {
      width:48px; height:48px; border-radius:12px; border:none;
      font-size:1.1rem; font-weight:900; cursor:pointer;
      background:#f5f5f5; color:#a3a3a3; transition:all .2s;
      font-family:'Barlow Condensed',sans-serif;
    }
    .group-tab.active { color:#fff; transform:scale(1.1); }

    .groups-layout { display:grid; gap:32px; }
    @media(min-width:1024px){ .groups-layout { grid-template-columns:7fr 5fr; } }

    .section-title { font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:900; margin-bottom:16px; }
    .section-title-sm { font-size:1.1rem; font-weight:700; margin-bottom:16px; }

    .legend { display:flex; gap:16px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
    .legend-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

    /* Tabla */
    .standings-card { background:#fff; border-radius:24px; border:1px solid #e5e5e5; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .standings-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:16px; }
    table { width:100%; border-collapse:collapse; font-size:.85rem; }
    thead th { background:#fafafa; color:#a3a3a3; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; padding:14px 8px; border-bottom:1px solid #f0f0f0; }
    thead th:first-child { padding-left:24px; text-align:left; }
    thead th:last-child { padding-right:24px; color:#1a1a1a; }
    tbody td { padding:14px 8px; text-align:center; color:#737373; font-weight:500; border-bottom:1px solid #f7f7f7; }
    tbody td:first-child { padding-left:24px; text-align:left; font-weight:700; color:#1a1a1a; font-size:1rem; display:flex; align-items:center; gap:10px; }
    tbody td:last-child { padding-right:24px; font-weight:900; font-size:1.2rem; color:#1a1a1a; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:#fafafa; }
    .indicator { width:6px; height:24px; border-radius:3px; flex-shrink:0; }

    /* Partidos */
    .match-card {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; background:#fff; border-radius:18px;
      border:1px solid #e5e5e5; margin-bottom:10px;
      box-shadow:0 1px 3px rgba(0,0,0,.05); transition:border-color .2s;
    }
    .match-card:hover { border-color:#d4d4d4; }
    .match-team { flex:1; font-weight:700; font-size:.95rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .match-team.right { text-align:right; padding-right:12px; }
    .match-team.left  { text-align:left;  padding-left:12px; }
    .score-wrap { display:flex; align-items:center; gap:6px; background:#fafafa; padding:6px; border-radius:12px; border:1px solid #e5e5e5; flex-shrink:0; }
    .score-input {
      width:48px; height:48px; text-align:center; font-size:1.2rem; font-weight:900;
      background:#fff; border-radius:10px; border:2px solid transparent;
      font-family:'Barlow',sans-serif; outline:none; transition:border-color .15s;
      box-shadow:0 1px 3px rgba(0,0,0,.07);
    }
    .vs-sep { color:#d4d4d4; font-weight:700; font-size:.75rem; }

    /* ── ELIMINATORIAS ── */
    .round-tabs { display:flex; gap:4px; background:#f5f5f5; padding:8px; border-radius:16px; width:fit-content; margin:0 auto 32px; flex-wrap:wrap; justify-content:center; }
    .round-tab {
      padding:10px 18px; border-radius:12px; font-size:.85rem; font-weight:700;
      border:none; cursor:pointer; background:transparent; color:#737373;
      transition:all .2s; font-family:'Barlow',sans-serif;
    }
    .round-tab.active { background:#fff; color:#1a1a1a; box-shadow:0 1px 3px rgba(0,0,0,.1); }
    .knockout-grid { display:grid; grid-template-columns:1fr; gap:16px; }
    @media(min-width:640px)  { .knockout-grid { grid-template-columns:repeat(2,1fr); } }
    @media(min-width:1024px) { .knockout-grid { grid-template-columns:repeat(4,1fr); } }
    .ko-match {
      background:#fff; border-radius:16px; border:1px solid #e5e5e5;
      padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.06);
    }
    .ko-match.final-match { border-width:2px; }
    .ko-match.disabled { opacity:.55; }
    .ko-row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .ko-team { font-weight:700; font-size:.95rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .ko-inputs { display:flex; gap:4px; align-items:center; }
    .ko-score {
      width:40px; height:40px; text-align:center; font-size:1.1rem; font-weight:900;
      background:#f5f5f5; border-radius:8px; border:2px solid transparent;
      font-family:'Barlow',sans-serif; outline:none; transition:box-shadow .15s;
    }
    .ko-pen {
      width:32px; height:32px; text-align:center; font-size:.8rem; font-weight:700;
      color:#fff; border-radius:6px; border:none;
      font-family:'Barlow',sans-serif; outline:none;
    }
    .ko-divider { height:1px; background:#f0f0f0; margin:10px 0; }
    .final-label {
      display:inline-block; padding:4px 14px; border-radius:999px;
      font-size:.75rem; font-weight:900; text-transform:uppercase; letter-spacing:.1em;
      color:#fff; background:#EA323D; margin-bottom:12px;
    }
    .ko-full { grid-column:1/-1; max-width:500px; margin:0 auto; width:100%; text-align:center; }
    .ko-half { grid-column:1/-1; }
    @media(min-width:1024px){ .ko-half { grid-column:span 2; } }

    /* ── RESUMEN ── */
    .card-wrap { max-width:400px; margin:0 auto; }
    .summary-card {
      position:relative; background:#fff; border-radius:40px;
      border:1px solid #e5e5e5; overflow:hidden;
      aspect-ratio:4/5; display:flex; flex-direction:column;
      box-shadow:0 20px 60px rgba(0,0,0,.1);
    }
    .card-bg1 { position:absolute; top:0; right:0; width:256px; height:256px; border-bottom-left-radius:50%; pointer-events:none; }
    .card-bg2 { position:absolute; bottom:-80px; left:-80px; width:320px; height:320px; border-radius:50%; opacity:.1; pointer-events:none; }
    .card-inner { padding:32px; flex:1; display:flex; flex-direction:column; position:relative; z-index:1; }
    .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:32px; }
    .card-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#a3a3a3; margin-bottom:4px; }
    .card-username { font-family:'Barlow Condensed',sans-serif; font-size:2rem; font-weight:900; line-height:1; }
    .card-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:1.1rem; flex-shrink:0; }
    .card-champion { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .champ-label { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#a3a3a3; margin-bottom:12px; }
    .champ-name { font-family:'Barlow Condensed',sans-serif; font-size:3.5rem; font-weight:900; text-transform:uppercase; letter-spacing:-.04em; color:#1a1a1a; }
    .champ-badge { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:#1a1a1a; color:#fff; border-radius:999px; font-weight:700; font-size:.8rem; margin-top:16px; }
    .semis-box { background:#fafafa; border-radius:16px; padding:16px; border:1px solid #f0f0f0; }
    .semis-label { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:#a3a3a3; text-align:center; margin-bottom:12px; }
    .semis-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .semi-team { background:#fff; padding:8px 10px; border-radius:12px; font-size:.8rem; font-weight:700; text-align:center; border:1px solid #f0f0f0; box-shadow:0 1px 2px rgba(0,0,0,.04); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .card-note { text-align:center; color:#a3a3a3; font-size:.8rem; margin-top:20px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── DATOS ────────────────────────────────────────────────────────────────────
const GROUPS = {
  A:['México','Sudáfrica','Corea','Chequia'],
  B:['Canadá','Bosnia','Qatar','Suiza'],
  C:['Brasil','Marruecos','Haití','Escocia'],
  D:['EE.UU.','Paraguay','Australia','Turquía'],
  E:['Alemania','Curazao','C. Marfil','Ecuador'],
  F:['P. Bajos','Japón','Suecia','Túnez'],
  G:['Bélgica','Egipto','Irán','N. Zelanda'],
  H:['España','Cabo Verde','Arabia S.','Uruguay'],
  I:['Francia','Senegal','Irak','Noruega'],
  J:['Argentina','Argelia','Austria','Jordania'],
  K:['Portugal','RD Congo','Uzbekistán','Colombia'],
  L:['Inglaterra','Croacia','Ghana','Panamá']
};
const GROUP_KEYS = Object.keys(GROUPS);

const PAIRS = [[0,1],[2,3],[0,2],[3,1],[3,0],[1,2]];
const ALL_MATCHES = (() => {
  let id=1, out=[];
  GROUP_KEYS.forEach(g => PAIRS.forEach(([a,b]) => out.push({id:id++,g,t1:GROUPS[g][a],t2:GROUPS[g][b]})));
  return out;
})();

const C = { violet:'#6820C9', green:'#11A653', red:'#EA323D', blue:'#0059C8' };
const USER_COLORS = [C.violet,C.green,C.blue,C.red,'#FF8A00','#00D1FF'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  tab: 'perfiles',
  users: [{ id:1, name:'Usuario 1', color:USER_COLORS[0], sc:{}, ks:{} }],
  uid: 1,
  newName: '',
  group: 'A',
  round: 'R32'
};

function setState(patch) {
  Object.assign(state, typeof patch === 'function' ? patch(state) : patch);
  render();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function activeUser() { return state.users.find(u=>u.id===state.uid) || state.users[0]; }

function standings(g, sc) {
  const teams = GROUPS[g].map(name=>({name,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0,pts:0,g}));
  ALL_MATCHES.filter(m=>m.g===g).forEach(m=>{
    const ms=sc[m.id];
    if(!ms||ms.t1===''||ms.t1===undefined||ms.t2===''||ms.t2===undefined) return;
    const g1=+ms.t1, g2=+ms.t2;
    const a=teams.find(t=>t.name===m.t1), b=teams.find(t=>t.name===m.t2);
    a.pj++;b.pj++;a.gf+=g1;a.gc+=g2;b.gf+=g2;b.gc+=g1;
    if(g1>g2){a.pts+=3;a.pg++;b.pp++;}
    else if(g2>g1){b.pts+=3;b.pg++;a.pp++;}
    else{a.pts++;b.pts++;a.pe++;b.pe++;}
  });
  teams.forEach(t=>t.dg=t.gf-t.gc);
  return teams.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
}

function allStandings(sc) {
  const r={};
  GROUP_KEYS.forEach(g=>r[g]=standings(g,sc));
  return r;
}

function qualified(sc) {
  const st=allStandings(sc);
  const firsts=[],seconds=[],thirds=[];
  Object.values(st).forEach(t=>{firsts.push(t[0]);seconds.push(t[1]);thirds.push(t[2]);});
  thirds.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf);
  return {firsts,seconds,best8:thirds.slice(0,8),st};
}

function winner(id,t1,t2,ks) {
  const s=ks[id];
  if(!s||s.g1===undefined||s.g1===''||s.g2===undefined||s.g2==='') return '???';
  const g1=+s.g1,g2=+s.g2;
  if(g1>g2) return t1; if(g2>g1) return t2;
  const p1=+(s.p1||0),p2=+(s.p2||0);
  if(p1>p2) return t1; if(p2>p1) return t2;
  return '???';
}

function bracket(sc,ks) {
  const {firsts,seconds,best8}=qualified(sc);
  const tn=(a,i)=>a[i]?a[i].name:'???';
  const gw=(id,t1,t2)=>winner(id,t1,t2,ks);

  const R32=[
    {id:'R32-1', t1:tn(firsts,0), t2:tn(best8,0)},
    {id:'R32-2', t1:tn(firsts,1), t2:tn(best8,1)},
    {id:'R32-3', t1:tn(firsts,2), t2:tn(best8,2)},
    {id:'R32-4', t1:tn(firsts,3), t2:tn(best8,3)},
    {id:'R32-5', t1:tn(firsts,4), t2:tn(best8,4)},
    {id:'R32-6', t1:tn(firsts,5), t2:tn(best8,5)},
    {id:'R32-7', t1:tn(firsts,6), t2:tn(best8,6)},
    {id:'R32-8', t1:tn(firsts,7), t2:tn(best8,7)},
    {id:'R32-9', t1:tn(firsts,8), t2:tn(seconds,0)},
    {id:'R32-10',t1:tn(firsts,9), t2:tn(seconds,1)},
    {id:'R32-11',t1:tn(firsts,10),t2:tn(seconds,2)},
    {id:'R32-12',t1:tn(firsts,11),t2:tn(seconds,3)},
    {id:'R32-13',t1:tn(seconds,4),t2:tn(seconds,8)},
    {id:'R32-14',t1:tn(seconds,5),t2:tn(seconds,9)},
    {id:'R32-15',t1:tn(seconds,6),t2:tn(seconds,10)},
    {id:'R32-16',t1:tn(seconds,7),t2:tn(seconds,11)},
  ];
  const R16=Array.from({length:8},(_,i)=>({id:`R16-${i+1}`,t1:gw(R32[i*2].id,R32[i*2].t1,R32[i*2].t2),t2:gw(R32[i*2+1].id,R32[i*2+1].t1,R32[i*2+1].t2)}));
  const QF=Array.from({length:4},(_,i)=>({id:`QF-${i+1}`,t1:gw(R16[i*2].id,R16[i*2].t1,R16[i*2].t2),t2:gw(R16[i*2+1].id,R16[i*2+1].t1,R16[i*2+1].t2)}));
  const SF=Array.from({length:2},(_,i)=>({id:`SF-${i+1}`,t1:gw(QF[i*2].id,QF[i*2].t1,QF[i*2].t2),t2:gw(QF[i*2+1].id,QF[i*2+1].t1,QF[i*2+1].t2)}));
  const Final=[{id:'FINAL',t1:gw(SF[0].id,SF[0].t1,SF[0].t2),t2:gw(SF[1].id,SF[1].t1,SF[1].t2)}];
  const champ=gw('FINAL',Final[0].t1,Final[0].t2);
  return {R32,R16,QF,SF,Final,champ};
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function addUser() {
  if(state.users.length>=6) return;
  const name=state.newName.trim()||`Usuario ${state.users.length+1}`;
  const nu={id:Date.now(),name,color:USER_COLORS[state.users.length%6],sc:{},ks:{}};
  setState(s=>({users:[...s.users,nu],uid:nu.id,newName:'',tab:'grupos'}));
}

function deleteUser(id,e) {
  e.stopPropagation();
  setState(s=>{
    let users=s.users.filter(u=>u.id!==id);
    if(!users.length) users=[{id:Date.now(),name:'Usuario 1',color:USER_COLORS[0],sc:{},ks:{}}];
    const uid=s.uid===id?users[0].id:s.uid;
    return {users,uid};
  });
}

function setScore(matchId,field,val) {
  if(val!==''&&!/^\d+$/.test(val)) return;
  setState(s=>({
    users:s.users.map(u=>u.id!==s.uid?u:{
      ...u, sc:{...u.sc,[matchId]:{...(u.sc[matchId]||{}),[field]:val}}
    })
  }));
}

function setKS(matchId,field,val) {
  if(val!==''&&!/^\d+$/.test(val)) return;
  setState(s=>({
    users:s.users.map(u=>u.id!==s.uid?u:{
      ...u, ks:{...u.ks,[matchId]:{...(u.ks[matchId]||{}),[field]:val}}
    })
  }));
}

// ─── HTML BUILDERS ────────────────────────────────────────────────────────────
function h(tag,attrs,...children) {
  const el=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className') el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false) return;
    el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  });
  return el;
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function viewPerfiles() {
  const wrap=h('div',{className:'profiles-wrap card-enter'});
  wrap.appendChild(h('h2',{className:'profiles-title'},'Elige tu Jugador'));
  wrap.appendChild(h('p',{className:'profiles-sub'},'Crea perfiles para que tus amigos también hagan sus predicciones.'));

  const grid=h('div',{className:'profiles-grid'});

  state.users.forEach(u=>{
    const card=h('div',{
      className:'profile-card',
      style:{borderColor:state.uid===u.id?u.color:'#e5e5e5'},
      onclick:()=>{setState({uid:u.id,tab:'grupos'});}
    });
    if(state.users.length>1){
      const del=h('button',{className:'profile-delete',onclick:(e)=>deleteUser(u.id,e)},'✕');
      card.appendChild(del);
    }
    card.appendChild(h('div',{className:'profile-avatar',style:{backgroundColor:u.color}}));
    card.appendChild(h('div',{className:'profile-name'},u.name));
    grid.appendChild(card);
  });

  if(state.users.length<6){
    const addBox=h('div',{className:'profile-add'});
    addBox.appendChild(h('div',{className:'profile-add-icon'},'+'));
    const inp=h('input',{type:'text',placeholder:'Nuevo Nombre...',value:state.newName});
    inp.addEventListener('input',e=>setState({newName:e.target.value}));
    inp.addEventListener('keydown',e=>e.key==='Enter'&&addUser());
    addBox.appendChild(inp);
    addBox.appendChild(h('button',{className:'btn-create',onclick:addUser},'Crear'));
    grid.appendChild(addBox);
  }

  wrap.appendChild(grid);
  return wrap;
}

function viewGrupos() {
  const u=activeUser();
  const sc=u.sc;
  const st=allStandings(sc);
  const {best8}=qualified(sc);
  const g=state.group;
  const table=st[g];

  const wrap=h('div',{className:'card-enter'});

  // Selector de grupos
  const tabs=h('div',{className:'group-tabs'});
  GROUP_KEYS.forEach(key=>{
    const btn=h('button',{
      className:'group-tab'+(key===g?' active':''),
      style:key===g?{backgroundColor:u.color}:{},
      onclick:()=>setState({group:key})
    },key);
    tabs.appendChild(btn);
  });
  wrap.appendChild(tabs);

  const layout=h('div',{className:'groups-layout'});

  // ── Tabla ──
  const leftCol=h('div');
  const standHeader=h('div',{className:'standings-header'});
  standHeader.appendChild(h('h2',{className:'section-title'},`Grupo ${g}`));
  const leg=h('div',{className:'legend'});
  leg.appendChild(h('span',{},...[h('span',{className:'legend-dot',style:{backgroundColor:C.green}}),' Avanza']));
  leg.appendChild(h('span',{},...[h('span',{className:'legend-dot',style:{backgroundColor:'#FFB800'}}),' Posible']));
  standHeader.appendChild(leg);
  leftCol.appendChild(standHeader);

  const card=h('div',{className:'standings-card'});
  const tbl=h('table');
  const thead=h('thead');
  const hr=h('tr');
  ['Selección','PJ','G','E','P','DG','PTS'].forEach((txt,i)=>{
    const th=h('th',{});
    th.textContent=txt;
    if(i>0) th.style.textAlign='center';
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  tbl.appendChild(thead);

  const tbody=h('tbody');
  table.forEach((team,idx)=>{
    let indColor='transparent';
    if(idx<2) indColor=C.green;
    else if(idx===2&&best8.some(t=>t.name===team.name)) indColor='#FFB800';

    const tr=h('tr');
    const nameTd=h('td');
    nameTd.appendChild(h('div',{className:'indicator',style:{backgroundColor:indColor}}));
    nameTd.appendChild(document.createTextNode(team.name));
    tr.appendChild(nameTd);
    [team.pj,team.pg,team.pe,team.pp,team.dg>0?`+${team.dg}`:team.dg,team.pts].forEach(v=>{
      tr.appendChild(h('td',{},String(v)));
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  card.appendChild(tbl);
  leftCol.appendChild(card);
  layout.appendChild(leftCol);

  // ── Partidos ──
  const rightCol=h('div');
  rightCol.appendChild(h('h3',{className:'section-title-sm'},'Partidos'));
  ALL_MATCHES.filter(m=>m.g===g).forEach(m=>{
    const mc=h('div',{className:'match-card'});
    mc.appendChild(h('div',{className:'match-team right'},m.t1));
    const sw=h('div',{className:'score-wrap'});

    const i1=h('input',{type:'text',inputmode:'numeric',className:'score-input',value:sc[m.id]?.t1??''});
    i1.addEventListener('input',e=>setScore(m.id,'t1',e.target.value));
    i1.addEventListener('focus',e=>e.target.style.borderColor=u.color);
    i1.addEventListener('blur',e=>e.target.style.borderColor='transparent');

    const i2=h('input',{type:'text',inputmode:'numeric',className:'score-input',value:sc[m.id]?.t2??''});
    i2.addEventListener('input',e=>setScore(m.id,'t2',e.target.value));
    i2.addEventListener('focus',e=>e.target.style.borderColor=u.color);
    i2.addEventListener('blur',e=>e.target.style.borderColor='transparent');

    sw.appendChild(i1);
    sw.appendChild(h('span',{className:'vs-sep'},'vs'));
    sw.appendChild(i2);
    mc.appendChild(sw);
    mc.appendChild(h('div',{className:'match-team left'},m.t2));
    rightCol.appendChild(mc);
  });
  layout.appendChild(rightCol);

  wrap.appendChild(layout);
  return wrap;
}

function koMatchCard(match,ks,userColor,isFinal,isHalf) {
  const s=ks[match.id]||{};
  const tied=s.g1!==undefined&&s.g1!==''&&s.g2!==undefined&&s.g2!==''&&s.g1===s.g2;
  const ready=match.t1!=='???'&&match.t2!=='???';

  let cls='ko-match';
  if(!ready) cls+=' disabled';

  const outer=isFinal?h('div',{className:isHalf?'ko-full':'ko-full'}):h('div');
  const card=h('div',{
    className:cls+(isFinal?' final-match':''),
    style:isFinal?{borderColor:userColor,boxShadow:`0 4px 20px ${userColor}33`}:{}
  });

  // Row t1
  const row1=h('div',{className:'ko-row'});
  row1.appendChild(h('div',{className:'ko-team'},match.t1));
  const inp1=h('div',{className:'ko-inputs'});
  if(tied){
    const p=h('input',{type:'text',inputmode:'numeric',className:'ko-pen',style:{backgroundColor:userColor},placeholder:'P',value:s.p1||''});
    p.addEventListener('input',e=>setKS(match.id,'p1',e.target.value));
    inp1.appendChild(p);
  }
  const g1=h('input',{type:'text',inputmode:'numeric',className:'ko-score',value:s.g1||''});
  if(!ready) g1.setAttribute('disabled','');
  g1.addEventListener('input',e=>setKS(match.id,'g1',e.target.value));
  g1.addEventListener('focus',e=>e.target.style.boxShadow=`0 0 0 2px ${userColor}`);
  g1.addEventListener('blur',e=>e.target.style.boxShadow='none');
  inp1.appendChild(g1);
  row1.appendChild(inp1);
  card.appendChild(row1);
  card.appendChild(h('div',{className:'ko-divider'}));

  // Row t2
  const row2=h('div',{className:'ko-row'});
  row2.appendChild(h('div',{className:'ko-team'},match.t2));
  const inp2=h('div',{className:'ko-inputs'});
  if(tied){
    const p=h('input',{type:'text',inputmode:'numeric',className:'ko-pen',style:{backgroundColor:userColor},placeholder:'P',value:s.p2||''});
    p.addEventListener('input',e=>setKS(match.id,'p2',e.target.value));
    inp2.appendChild(p);
  }
  const g2=h('input',{type:'text',inputmode:'numeric',className:'ko-score',value:s.g2||''});
  if(!ready) g2.setAttribute('disabled','');
  g2.addEventListener('input',e=>setKS(match.id,'g2',e.target.value));
  g2.addEventListener('focus',e=>e.target.style.boxShadow=`0 0 0 2px ${userColor}`);
  g2.addEventListener('blur',e=>e.target.style.boxShadow='none');
  inp2.appendChild(g2);
  row2.appendChild(inp2);
  card.appendChild(row2);

  if(isFinal){
    outer.style.textAlign='center';
    outer.appendChild(h('div',{className:'final-label'},'La Gran Final'));
  }
  outer.appendChild(card);
  return outer;
}

function viewEliminatorias() {
  const u=activeUser();
  const br=bracket(u.sc,u.ks);
  const round=state.round;

  const wrap=h('div',{className:'card-enter'});

  const rtabs=h('div',{className:'round-tabs'});
  [{id:'R32',l:'16avos'},{id:'R16',l:'Octavos'},{id:'QF',l:'Cuartos'},{id:'SF',l:'Semis'},{id:'FINAL',l:'Final'}].forEach(r=>{
    rtabs.appendChild(h('button',{
      className:'round-tab'+(round===r.id?' active':''),
      onclick:()=>setState({round:r.id})
    },r.l));
  });
  wrap.appendChild(rtabs);

  const grid=h('div',{className:'knockout-grid'});

  const matches=br[round==='FINAL'?'Final':round];
  matches.forEach((m,i)=>{
    const isFinal=round==='FINAL';
    const isHalf=round==='SF';
    const card=koMatchCard(m,u.ks,u.color,isFinal);
    if(isHalf) card.className='ko-half';
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  return wrap;
}

function viewResumen() {
  const u=activeUser();
  const br=bracket(u.sc,u.ks);

  const wrap=h('div',{className:'card-wrap zoom-enter'});
  const card=h('div',{className:'summary-card'});

  const bg1=h('div',{className:'card-bg1',style:{background:`linear-gradient(to bottom left, ${u.color}44, transparent)`}});
  const bg2=h('div',{className:'card-bg2',style:{backgroundColor:u.color}});
  card.appendChild(bg1);
  card.appendChild(bg2);

  const inner=h('div',{className:'card-inner'});

  // Header
  const hdr=h('div',{className:'card-header'});
  const hdrLeft=h('div');
  hdrLeft.appendChild(h('div',{className:'card-label'},'Predicción Oficial 2026'));
  hdrLeft.appendChild(h('div',{className:'card-username',style:{color:u.color}},u.name));
  hdr.appendChild(hdrLeft);
  hdr.appendChild(h('div',{className:'card-avatar',style:{backgroundColor:u.color}},u.name.charAt(0).toUpperCase()));
  inner.appendChild(hdr);

  // Campeón
  const champ=h('div',{className:'card-champion'});
  champ.appendChild(h('div',{className:'champ-label'},'Mi Campeón'));
  champ.appendChild(h('div',{className:'champ-name'},br.champ));
  if(br.champ!=='???'){
    champ.appendChild(h('div',{className:'champ-badge'},'🏆 ¡Levanta la copa!'));
  }
  inner.appendChild(champ);

  // Semifinalistas
  const semis=h('div',{className:'semis-box'});
  semis.appendChild(h('div',{className:'semis-label'},'Semifinalistas'));
  const sg=h('div',{className:'semis-grid'});
  const col1=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}});
  col1.appendChild(h('div',{className:'semi-team'},br.SF[0]?.t1||'???'));
  col1.appendChild(h('div',{className:'semi-team'},br.SF[0]?.t2||'???'));
  const col2=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}});
  col2.appendChild(h('div',{className:'semi-team'},br.SF[1]?.t1||'???'));
  col2.appendChild(h('div',{className:'semi-team'},br.SF[1]?.t2||'???'));
  sg.appendChild(col1);
  sg.appendChild(col2);
  semis.appendChild(sg);
  inner.appendChild(semis);

  card.appendChild(inner);
  wrap.appendChild(card);
  wrap.appendChild(h('p',{className:'card-note'},'Toma una captura de pantalla y compártela con tus amigos.'));
  return wrap;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const u=activeUser();
  const app=document.getElementById('app');
  app.innerHTML='';

  // Page
  const page=h('div',{className:'page'});

  // Header
  const hdr=h('header',{className:'header'});
  const hi=h('div',{className:'header-inner'});

  const logo=h('div',{className:'logo'});
  logo.appendChild(h('div',{className:'logo-dot'}));
  logo.appendChild(h('h1',{style:{color:'#1a1a1a'}},'PREDICCIONES 2026'));
  hi.appendChild(logo);

  if(state.tab!=='perfiles'){
    const nav=h('div',{className:'nav-tabs'});
    [{id:'perfiles',l:'👥 Jugadores'},{id:'grupos',l:'Grupos'},{id:'eliminatorias',l:'Fase Final'},{id:'resumen',l:'🏆 Tarjeta'}].forEach(t=>{
      const btn=h('button',{
        className:'nav-tab'+(state.tab===t.id?' active':''),
        style:state.tab===t.id?{color:u.color}:{},
        onclick:()=>setState({tab:t.id})
      },t.l);
      nav.appendChild(btn);
    });
    hi.appendChild(nav);
  }

  hdr.appendChild(hi);
  page.appendChild(hdr);

  // Main
  const main=h('main');
  const views={perfiles:viewPerfiles,grupos:viewGrupos,eliminatorias:viewEliminatorias,resumen:viewResumen};
  main.appendChild(views[state.tab]());
  page.appendChild(main);

  app.appendChild(page);
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render();
</script>
